server:
  port: 8081

spring:
  application:
    name: cliente-service

datasource:
  url: jdbc:h2:mem:testdb
  driver-class-name: org.h2.Driver
  username: sa
  password:

h2:
  console:
    enabled: true

jpa:
  hibernate:
    ddl-auto: update
  show-sql: true

spring doc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true